name: Validate Rootfs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package lists
        run: |
          echo "Checking package lists..."
          for f in packages/*.list; do
            echo "Validating $f"
            # Remove comments and empty lines, check for duplicates
            grep -v '^#' "$f" | grep -v '^$' | sort | uniq -d | while read -r dup; do
              echo "ERROR: Duplicate package '$dup' in $f"
              exit 1
            done
            echo "  ✓ $f OK"
          done

      - name: Check overlay structure
        run: |
          echo "Checking overlay directory..."
          test -d overlay/etc && echo "  ✓ overlay/etc exists"
          test -f overlay/etc/hostname && echo "  ✓ hostname file exists"
          test -f overlay/etc/hosts && echo "  ✓ hosts file exists"
          echo "All checks passed!"
